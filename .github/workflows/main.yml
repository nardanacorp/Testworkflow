name: Nginx Health‑Check

on:
  push:
    branches: [ main ]          # یا می‌توانید از workflow_dispatch استفاده کنید
  # workflow_dispatch:          # برای اجرای دستی

jobs:
  test-nginx:
    runs-on: ubuntu-latest      # یا ["self-hosted", "linux"]
    env:
      SERVER_IP: 94.183.176.4      # آدرس IP سرور nginx (یا localhost اگر روی همان runner است)

    steps:
      # 1️⃣ منتظر می‌ماند تا nginx آماده شود
      - name: Wait for Nginx to be ready
        run: |
          echo "Waiting for nginx on $SERVER_IP:80 ..."
          if curl -s --head http://$SERVER_IP | grep -q "200 OK"; then
              echo "Nginx is up!"
              exit 0
          fi
          exit 1
        shell: bash
