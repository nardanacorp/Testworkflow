name: Nginx Health‑Check

on:
  push:
    branches: [ main ]          # یا می‌توانید از workflow_dispatch استفاده کنید
  # workflow_dispatch:          # برای اجرای دستی

jobs:
  test-nginx:
    runs-on: ubuntu-latest      # یا ["self-hosted", "linux"]
    env:
      SERVER_IP: 94.183.176.4      # آدرس IP سرور nginx (یا localhost اگر روی همان runner است)

    steps:
      # 1️⃣ منتظر می‌ماند تا nginx آماده شود
      - name: Wait for Nginx to be ready
        run: |
          echo "Waiting for nginx on $SERVER_IP:80 ..."
          # سعی می‌کنیم تا 30 ثانیه بپیچیم، اگر از قبل nginx در دسترس نیست
          for i in {1..30}; do
            if curl -s --head http://$SERVER_IP | grep -q "200 OK"; then
              echo "Nginx is up!"
              exit 0
            fi
            echo -n "."
            sleep 1
          done
          echo "Nginx did not respond after 30 seconds."
          exit 1
        shell: bash

      # 2️⃣ بررسی صفحه‌ی اصلی
      - name: Check root page
        run: |
          echo "Fetching root page from $SERVER_IP ..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://$SERVER_IP)
          echo "HTTP status: $RESPONSE"
          if [ "$RESPONSE" -ne 200 ]; then
            echo "❌ Expected 200, but got $RESPONSE"
            exit 1
          fi
          echo "✅ Nginx returned 200 OK."
        shell: bash
