name: Ping 8.8.8.8

on:
  workflow_dispatch:          # می‌توانید آن را به‌صورت دستی نیز فراخوانی کنید

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping target IP
        run: |
          IP="8.8.8.8"
          echo "Pinging $IP ..."
          ping -c 4 $IP
          EXIT_CODE=$?
          echo "Ping exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Ping failed"
            exit 1
          else
            echo "Ping succeeded"
          fi
        shell: bash
